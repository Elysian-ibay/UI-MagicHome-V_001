    <!-- STATUS CONNECTION CARD -->
    <section class="card card--status" id="statusCard">
      <div class="card__header">
        <div class="card__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M5 12.55a11 11 0 0 1 14.08 0" />
            <path d="M1.42 9a16 16 0 0 1 21.16 0" />
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
            <circle cx="12" cy="20" r="1" />
          </svg>
        </div>
        <h2 class="card__title">Status Koneksi</h2>
        <div class="card__header-indicator" id="serverIndicator">
          <span class="status-dot status-dot--offline"></span>
        </div>
      </div>
      <div class="card__body">
        <div class="status-grid">
          <div class="status-item" id="statusItemEsp">
            <span class="status-item__label">ESP32 Device</span>
            <span class="status-item__value" id="espStatus">
              <span class="status-dot status-dot--offline"></span>
              <span id="espStatusText">Menunggu...</span>
            </span>
          </div>
          <div class="status-item" id="statusItemLamp">
            <span class="status-item__label">Status Lampu</span>
            <span class="status-item__value" id="lampStatus">
              <span class="status-dot status-dot--offline"></span>
              <span id="lampStatusText">OFF</span>
            </span>
          </div>
          <div class="status-item" id="statusItemColor">
            <span class="status-item__label">Warna Aktif</span>
            <span class="status-item__value status-item__value--color" id="activeColor">
              <span class="color-indicator" id="colorIndicator"></span>
              <span id="activeColorText">—</span>
            </span>
          </div>
          <div class="status-item" id="statusItemTime">
            <span class="status-item__label">Terakhir Update</span>
            <span class="status-item__value status-item__value--small" id="lastUpdate">—</span>
          </div>
          <div class="status-item" id="statusItemSchedule" style="display: none;">
            <span class="status-item__label">Jadwal Harian</span>
            <span class="status-item__value status-item__value--schedule" id="scheduleStatusText">
              📅 <span id="scheduleInfo">—</span>
            </span>
          </div>
        </div>
      </div>
    </section>

    <!-- CONTROL PANEL -->
    <section class="card card--controls" id="controlPanel">
      
      <!-- TAB BAR NAVIGATION -->
      <div class="tab-bar">
        <button class="tab-btn is-active" id="tabControl">KONTROL</button>
        <button class="tab-btn" id="tabSchedule">JADWAL</button>
      </div>

      <div class="card__body controls-wrapper">
        
        <!-- PANEL 1: KONTROL -->
        <div class="tab-panel is-active" id="panelControl">
          <nav class="control-navbar navbar-primary">
            <!-- POWER ITEM -->
            <button class="nav-item nav-item--power" id="btnPower" aria-label="Toggle Power On/Off">
              <div class="nav-item__glow" id="powerGlow"></div>
              <div class="nav-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18.36 6.64a9 9 0 1 1-12.73 0" />
                  <line x1="12" y1="2" x2="12" y2="12" />
                </svg>
              </div>
              <span class="nav-label" id="powerLabel">POWER OFF</span>
            </button>

            <!-- COLOR ITEM -->
            <button class="nav-item nav-item--color" id="btnColor" aria-label="Ganti Warna Lampu">
              <div class="nav-item__glow" id="colorGlow"></div>
              <div class="nav-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="13.5" cy="6.5" r="2.5" />
                  <circle cx="17.5" cy="10.5" r="2.5" />
                  <circle cx="8.5" cy="7.5" r="2.5" />
                  <circle cx="6.5" cy="12.5" r="2.5" />
                  <path d="M12 22a7 7 0 0 0 5-11.95A7 7 0 0 0 5 12a7 7 0 0 0 7 10z" />
                </svg>
              </div>
              <span class="nav-label" id="colorLabel">GANTI WARNA</span>
            </button>
          </nav>
        </div>

        <!-- PANEL 2: JADWAL -->
        <div class="tab-panel" id="panelSchedule">
          <div class="schedule-form">
            <div class="time-group">
              <label for="inputOnTime" class="time-label">Lampu NYALA (ON)</label>
              <input type="time" id="inputOnTime" class="time-input">
            </div>
            <div class="time-group">
              <label for="inputOffTime" class="time-label">Lampu MATI (OFF)</label>
              <input type="time" id="inputOffTime" class="time-input">
            </div>
            <div class="schedule-actions">
              <button class="action-btn action-btn--danger" id="btnClearSchedule">Hapus</button>
              <button class="action-btn action-btn--primary" id="btnSaveSchedule">Simpan</button>
            </div>
          </div>
        </div>

      </div>
    </section>
